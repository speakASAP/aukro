apiVersion: apps/v1
kind: Deployment
metadata:
  name: aukro-service
  namespace: statex-apps
  labels:
    app: aukro-service
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aukro-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: aukro-service
    spec:
      containers:
        - name: app
          image: localhost:5000/aukro-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3700
          envFrom:
            - configMapRef:
                name: aukro-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aukro-service-secret
                  key: JWT_SECRET
            - name: JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aukro-service-secret
                  key: JWT_TOKEN
            - name: AUKRO_INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aukro-service-secret
                  key: AUKRO_INTERNAL_SERVICE_TOKEN
            - name: WAREHOUSE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aukro-service-secret
                  key: WAREHOUSE_SERVICE_TOKEN
            - name: AUKRO_PUBLIC_API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aukro-service-secret
                  key: AUKRO_PUBLIC_API_USERNAME
                  optional: true
            - name: AUKRO_PUBLIC_API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aukro-service-secret
                  key: AUKRO_PUBLIC_API_PASSWORD
                  optional: true
            - name: AUKRO_PUBLIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aukro-service-secret
                  key: AUKRO_PUBLIC_API_KEY
                  optional: true
            - name: AUKRO_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: aukro-service-secret
                  key: AUKRO_WEBHOOK_SECRET
                  optional: true
          startupProbe:
            httpGet:
              path: /health
              port: 3700
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3700
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3700
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
