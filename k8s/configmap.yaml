apiVersion: v1
kind: ConfigMap
metadata:
  name: aukro-config
  namespace: statex-apps
  labels:
    app: aukro-service
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "aukro-service"
  DOMAIN: "aukro.alfares.cz"
  AUKRO_SERVICE_PORT: "3700"
  AUKRO_ADMIN_EMAILS: "test@example.com"
  AUKRO_USE_SANDBOX: "false"
  AUKRO_PUBLIC_API_BASE_URL: "https://aukro.cz/api/v2"
  AUKRO_PUBLIC_API_ENVIRONMENT: "production"
  AUKRO_PUBLIC_API_LANGUAGE: "cs-CZ"
  AUKRO_PUBLIC_API_CURRENCY: "CZK"
  AUKRO_PUBLIC_API_TIMEOUT_MS: "10000"
  AUTH_SERVICE_URL: "http://auth-microservice:3370"
  CATALOG_SERVICE_URL: "http://catalog-microservice:3200"
  WAREHOUSE_SERVICE_URL: "http://warehouse-microservice:3201"
  ORDER_SERVICE_URL: "http://orders-microservice:3203"
  NOTIFICATION_SERVICE_URL: "http://notifications-microservice:3368"
  LOGGING_SERVICE_URL: "http://logging-microservice:3367"
  PAYMENT_SERVICE_URL: "https://payments.alfares.cz"
  PAYMENT_APPLICATION_ID: "aukro-service"
  PAYMENT_CALLBACK_URL: "https://aukro.alfares.cz/api/webhooks/payment-result"
  PAYMENT_CANCEL_URL: "https://aukro.alfares.cz/payment-result?status=cancelled"
  PAYMENT_SUCCESS_URL: "https://aukro.alfares.cz/payment-result?status=completed"
  API_GATEWAY_PORT: "3701"
  GATEWAY_PROXY_PORT: "3704"
  GATEWAY_TIMEOUT: "30000"
  HTTP_TIMEOUT: "30000"
  CORS_ORIGIN: "https://aukro.alfares.cz"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
  CATALOG_EVENTS_EXCHANGE: "catalog.events"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "aukro"
