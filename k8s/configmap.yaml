apiVersion: v1
kind: ConfigMap
metadata:
  name: aukro-service-config
  namespace: statex-apps
  labels:
    app: aukro-service
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "aukro-service"
  DOMAIN: "aukro.alfares.cz"
  PORT: "3700"
  AUKRO_SERVICE_PORT: "3700"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "192.168.88.53"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "aukro"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  HTTP_TIMEOUT: "5000"
  AI_SERVICE_URL: "http://ai-microservice:3380"
  LEADS_SERVICE_URL: "http://leads-microservice:4400"
  MARKETING_SERVICE_URL: "http://marketing-microservice:4600"
  MINIO_SERVICE_URL: "http://minio-microservice:9000"
  NOTIFICATION_SERVICE_URL: "http://notifications-microservice:3368"
  PAYMENT_SERVICE_URL: "http://payments-microservice:3468"
  SUPPLIERS_SERVICE_URL: "http://suppliers-microservice:3202"
  LOGGING_SERVICE_URL: "http://logging-microservice:3367"
  # TIMEOUT_MS: "30000"
