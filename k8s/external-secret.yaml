apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aukro-service-secret
  namespace: statex-apps
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aukro-service-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/prod/aukro-service
        property: DATABASE_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/prod/aukro-service
        property: JWT_SECRET
    - secretKey: PAYMENT_API_KEY
      remoteRef:
        key: secret/prod/aukro-service
        property: PAYMENT_API_KEY
    - secretKey: PAYMENT_APPLICATION_ID
      remoteRef:
        key: secret/prod/aukro-service
        property: PAYMENT_APPLICATION_ID
    - secretKey: PAYMENT_WEBHOOK_API_KEY
      remoteRef:
        key: secret/prod/aukro-service
        property: PAYMENT_WEBHOOK_API_KEY

    - secretKey: JWT_TOKEN
      remoteRef:
        key: secret/prod/aukro-service
        property: JWT_TOKEN
    - secretKey: AUKRO_INTERNAL_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/aukro-service
        property: JWT_TOKEN
    - secretKey: WAREHOUSE_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/aukro-service
        property: WAREHOUSE_SERVICE_TOKEN
